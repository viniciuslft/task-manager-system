$kind: http-request
description: >-
  This is a POST request, submitting data to an API via the request body. This
  request submits JSON data, and the data is reflected in the response.


  A successful POST request typically returns a `200 OK` or `201 Created`
  response code.
url: "{{base_url}}/api/projects/1/tasks"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "Implement authentication",
      "description": "Add API authentication flow",
      "status": "todo",
      "priority": "high",
      "due_date": "2026-03-15"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Successful POST request", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
    language: text/javascript
order: 1000
